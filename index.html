<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD SEVENS v3.0</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; margin: 0; }
        .panel { border: 2px solid #0f0; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px #0f0; max-width: 400px; margin: 20px auto; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 85%; margin-bottom: 15px; text-align: center; font-size: 1.1em; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        #resultado { margin-top: 20px; text-align: left; }
        .adv-card { border-left: 5px solid #0f0; background: #111; margin-bottom: 15px; padding: 15px; border-radius: 0 10px 10px 0; }
        .wa-btn { display: block; background: #25d366; color: #fff; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; text-align: center; }
        .error { color: #ff4444; display: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel">
    <h2>DASHBOARD SEVENS</h2>
    <p style="font-size: 0.8rem;">SISTEMA OPERACIONAL v3.0</p>
    
    <input type="number" id="dddInput" placeholder="DIGITE O DDD">
    <button onclick="consultarBanco()">CONSULTAR BANCO DE DADOS</button>
    
    <div id="errorMsg" class="error">DDD NÃO ENCONTRADO NO SISTEMA</div>
    <div id="resultado"></div>
</div>

<script>
const database = [
    { ddd: "11", nome: "Dr. Thiago Alencar", oab: "SP 412.550", esp: "Especialista IRPJ", link: "https://wa.me/5511977881122" },
    { ddd: "16", nome: "Dra. Letícia Ribeirão", oab: "SP 402.115", esp: "Planejamento Sucessório", link: "https://wa.me/5516992211443" },
    { ddd: "19", nome: "Dr. Caio Campinas", oab: "SP 455.220", esp: "ICMS e Recuperação", link: "https://wa.me/5519991122445" },
    { ddd: "21", nome: "Dra. Carla Niterói", oab: "RJ 210.441", esp: "Tributário Imobiliário", link: "https://wa.me/5521991122445" },
    { ddd: "27", nome: "Dr. Arthur Vitória", oab: "ES 22.114", esp: "Comércio Exterior", link: "https://wa.me/5527991144223" },
    { ddd: "31", nome: "Dra. Sophia Contagem", oab: "MG 225.441", esp: "Direito Mineração", link: "https://wa.me/5531991122556" },
    { ddd: "41", nome: "Dra. Karen Curitiba", oab: "PR 82.114", esp: "Tributário Corporativo", link: "https://wa.me/5541992211443" },
    { ddd: "61", nome: "Dr. Igor Planalto", oab: "DF 62.441", esp: "Consultoria Brasília", link: "https://wa.me/5561991144556" },
    { ddd: "62", nome: "Dra. Kelly Goiânia", oab: "GO 41.220", esp: "Planejamento Agro", link: "https://wa.me/5562988112244" },
    { ddd: "81", nome: "Dr. Pedro Recife", oab: "PE 32.110", esp: "Planejamento Nordeste", link: "https://wa.me/5581992211443" },
    { ddd: "85", nome: "Dra. Luiza Meireles", oab: "CE 38.441", esp: "Incentivos Energia", link: "https://wa.me/5585991144556" },
    { ddd: "92", nome: "Dra. Marta Amazonas", oab: "AM 33.110", esp: "Logística e Impostos", link: "https://wa.me/5592988114422" }
    // Adicione os outros aqui seguindo o mesmo padrão
];

function consultarBanco() {
    const dddInput = document.getElementById('dddInput').value;
    const res = document.getElementById('resultado');
    const erro = document.getElementById('errorMsg');
    
    res.innerHTML = "";
    erro.style.display = "none";

    if (!dddInput) return;

    const filtrados = database.filter(adv => adv.ddd === dddInput);

    if (filtrados.length > 0) {
        filtrados.forEach(adv => {
            res.innerHTML += `
                <div class="adv-card">
                    <strong>${adv.nome}</strong><br>
                    <small style="color:#aaa;">OAB: ${adv.oab}</small><br>
                    <span style="font-size:0.9em;">${adv.esp}</span><br>
                    <a href="${adv.link}" target="_blank" class="wa-btn">WhatsApp</a>
                </div>`;
        });
    } else {
        erro.style.display = "block";
    }
}
</script>
</body>
</html>
