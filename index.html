<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Sevens</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #238636; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .box {
            border: 2px solid #238636;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(35, 134, 54, 0.4);
        }
        h1 { margin: 0; font-size: 2.2rem; }
        p { color: #8b949e; font-size: 1.1rem; margin-top: 15px; }
        .blink { animation: blinker 1.5s linear infinite; color: #f85149; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="box">
        <h1>SEVENS-LAB</h1>
        <p>SISTEMA: <span style="color: #fff;">ATIVO</span></p>
        <p>STATUS: <span class="blink">OPERANDO NO SIGILO</span></p>
    </div>
</body>
</html>
