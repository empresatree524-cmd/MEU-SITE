    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD SEVENS - V2</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { border: 2px solid #00ff41; border-radius: 10px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 0 15px #00ff41; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #00ff41; color: #00ff41; text-align: center; border-radius: 5px; }
        button { width: 85%; padding: 12px; background: #00ff41; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .resultado-item { background: #1a1a1a; margin: 10px 0; padding: 10px; border-radius: 5px; border-left: 4px solid #00ff41; text-align: left; }
        a { color: #fff; text-decoration: none; font-weight: bold; display: block; margin-top: 5px; background: #25d366; padding: 5px; text-align: center; border-radius: 3px; }
        #erroMsg { color: #ff4141; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>DASHBOARD SEVENS</h2>
    <p>BUSCA TRIBUTÁRIA NACIONAL</p>
    <input type="text" id="dddInput" placeholder="DIGITE O DDD (ex: 62)">
    <button onclick="consultarBanco()">CONSULTAR BANCO DE DADOS</button>
    <div id="erroMsg">DDD ainda não mapeado no sistema.</div>
    <div id="listaResultados"></div>
</div>

<script>
const database = [
    { ddd: "11", nome: "Velloza Advogados", esp: "Processos Tributários", link: "https://wa.me/551131450055" },
    { ddd: "11", nome: "Mattos Filho", esp: "Contencioso Alto Valor", link: "https://wa.me/551131477600" },
    { ddd: "62", nome: "Ficht Advocacia", esp: "Execuções Fiscais", link: "https://wa.me/5562981710106" },
    { ddd: "62", nome: "Miziara Advogados", esp: "Tributário e Agro", link: "https://wa.me/556232233000" },
    { ddd: "31", nome: "Moura & Tavares", esp: "Direito Tributário MG", link: "https://wa.me/553132815544" },
    { ddd: "71", nome: "Gamil Föppel", esp: "Tributário e Penal", link: "https://wa.me/557130117350" },
    { ddd: "81", nome: "Queiroz Cavalcanti", esp: "Especialista NE", link: "https://wa.me/558132174444" }
];

function consultarBanco() {
    const dddBusca = document.getElementById('dddInput').value.trim();
    const listaResultados = document.getElementById('listaResultados');
    const erroMsg = document.getElementById('erroMsg');
    
    listaResultados.innerHTML = "";
    erroMsg.style.display = "none";

    const resultados = database.filter(adv => adv.ddd === dddBusca);

    if (resultados.length > 0) {
        resultados.forEach(adv => {
            const item = document.createElement('div');
            item.className = 'resultado-item';
            item.innerHTML = `
                <strong>${adv.nome}</strong><br>
                <small>${adv.esp}</small>
                <a href="${adv.link}" target="_blank">WhatsApp</a>
            `;
            listaResultados.appendChild(item);
        });
    } else {
        erroMsg.style.display = "block";
    }
}
</script>
</body>
</html>
