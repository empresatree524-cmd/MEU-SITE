function consultarBanco() {
    const dddBusca = document.getElementById('dddInput').value.trim();
    const listaResultados = document.getElementById('listaResultados');
    const erroMsg = document.getElementById('erroMsg');
    
    listaResultados.innerHTML = "";
    erroMsg.style.display = "none";

    const resultados = database.filter(adv => adv.ddd === dddBusca);

    if (resultados.length > 0) {
        resultados.forEach(adv => {
            const item = document.createElement('div');
            item.className = 'resultado-item';
            item.innerHTML = `
                <strong>${adv.nome}</strong><br>
                <small>${adv.esp}</small>
                <a href="${adv.link}" target="_blank">WhatsApp</a>
            `;
            listaResultados.appendChild(item);
        });
    } else {
        erroMsg.style.display = "block";
    }
}
