<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVENS OS v4.0 | INTELLIGENCE</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .terminal { border: 1px solid var(--neon); width: 100%; max-width: 500px; padding: 25px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); position: relative; overflow: hidden; }
        .terminal::before { content: "SYS_ROOT: ACCESS_GRANTED"; position: absolute; top: 5px; right: 10px; font-size: 0.6rem; opacity: 0.5; }
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
        .search-box { margin: 20px 0; position: relative; }
        input { width: 100%; background: transparent; border: 1px solid var(--neon); color: #fff; padding: 15px; box-sizing: border-box; font-size: 1.2rem; outline: none; transition: 0.3s; }
        input:focus { box-shadow: inset 0 0 10px var(--neon); }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #status-bar { font-size: 0.7rem; margin-top: 10px; height: 15px; color: #888; }
        .results-container { margin-top: 20px; max-height: 500px; overflow-y: auto; scrollbar-width: thin; }
        .adv-card { background: var(--card); border: 1px solid #333; padding: 15px; margin-bottom: 15px; position: relative; animation: scan 0.4s ease-out; }
        .adv-card:hover { border-color: var(--neon); }
        .adv-name { font-size: 1.1rem; color: #fff; display: block; margin-bottom: 5px; }
        .adv-info { font-size: 0.8rem; color: var(--neon); opacity: 0.8; }
        .btn-wa { display: block; background: #25d366; color: white; text-decoration: none; text-align: center; padding: 10px; margin-top: 12px; border-radius: 3px; font-weight: bold; font-family: sans-serif; }
        @keyframes scan { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="terminal">
    <h1>SEVENS <span style="color:#fff">OS</span></h1>
    <p style="text-align: center; font-size: 0.7rem;">DATABASE: CORRESPONDENTES_NA_WEB_INTEGRATED</p>

    <div class="search-box">
        <input type="number" id="dddSearch" placeholder="DIGITE O DDD (EX: 61)" onkeyup="if(event.key==='Enter') buscar()">
        <button onclick="buscar()">EXECUTAR SCAN NACIONAL</button>
        <div id="status-bar">SISTEMA ONLINE...</div>
    </div>

    <div id="results" class="results-container"></div>
</div>

<script>
// AQUI VAI ENTRAR O RESULTADO DO SEU SCRAPER
const database = [
    { ddd: "61", nome: "Dr. Rafael Mendes", oab: "DF 55.441", cidade: "Brasília", link: "https://wa.me/5561998877665" },
    { ddd: "11", nome: "Dra. Ana Paula Ferreira", oab: "SP 352.441", cidade: "São Paulo", link: "https://wa.me/5511988771122" },
    { ddd: "16", nome: "Dra. Letícia Ribeirão", oab: "SP 402.115", cidade: "Ribeirão Preto", link: "https://wa.me/5516992211443" }
    // O Scraper vai gerar milhares de linhas como estas acima.
];

function buscar() {
    const ddd = document.getElementById('dddSearch').value;
    const res = document.getElementById('results');
    const status = document.getElementById('status-bar');
    
    res.innerHTML = "";
    if(!ddd) return;

    status.innerText = "ESCANEANDO BANCO DE DADOS...";
    
    // Filtro inteligente baseado no Scraper
    const filtrados = database.filter(adv => adv.ddd === ddd);

    setTimeout(() => {
        if(filtrados.length > 0) {
            status.innerText = filtrados.length + " REGISTROS ENCONTRADOS.";
            filtrados.forEach(adv => {
                res.innerHTML += `
                    <div class="adv-card">
                        <span class="adv-name">${adv.nome}</span>
                        <span class="adv-info">OAB: ${adv.oab} | ${adv.cidade}</span>
                        <a href="${adv.link}" target="_blank" class="btn-wa">CONTATO WHATSAPP</a>
                    </div>
                `;
            });
        } else {
            status.innerText = "ERRO: DDD NÃO LOCALIZADO.";
            res.innerHTML = "<p style='color:red; text-align:center;'>NENHUM CORRESPONDENTE NA BASE.</p>";
        }
    }, 500);
}
</script>

</body>
</html>
