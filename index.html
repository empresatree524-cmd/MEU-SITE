<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVENS PANEL</title>
    <style>
        body { background-color: #0d1117; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .panel { width: 90%; max-width: 400px; border: 1px solid #238636; border-radius: 10px; padding: 20px; background: rgba(13, 17, 23, 0.9); box-shadow: 0 0 15px #238636; }
        .header { text-align: center; border-bottom: 1px solid #238636; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #238636; margin: 0; font-size: 1.5rem; }
        .status-bar { font-size: 0.8rem; color: #8b949e; margin-top: 5px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; text-align: center; background: transparent; border: 1px solid #238636; color: #238636; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        .btn:hover { background: #238636; color: #fff; box-shadow: 0 0 10px #238636; }
        .footer { text-align: center; font-size: 0.7rem; color: #f85149; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <h2>DASHBOARD SEVENS</h2>
            <div class="status-bar">ID: ADMIN-TH | STATUS: ONLINE</div>
        </div>

        <a href="#" class="btn">WHATSAPP SUPORTE</a>
        <a href="#" class="btn">PROJETOS ATIVOS</a>
        <a href="#" class="btn">CONFIGURAÇÕES</a>

        <div class="footer">Operando no Sigilo</div>
    </div>
</body>
</html>
