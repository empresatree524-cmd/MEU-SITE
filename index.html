        <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVENS PANEL - BUSCA NACIONAL</title>
    <style>
        body { background-color: #0d1117; color: #39ff14; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .panel { width: 90%; max-width: 400px; border: 2px solid #39ff14; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); background: #161b22; }
        .header { border-bottom: 1px solid #39ff14; margin-bottom: 20px; text-align: center; }
        h2 { color: #39ff14; margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #39ff14; background: #0d1117; color: #39ff14; border-radius: 5px; box-sizing: border-box; text-align: center; font-size: 1.1rem; }
        .btn { display: block; width: 100%; padding: 12px; background: #39ff14; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn:hover { background: #2ea043; }
        #resultado { margin-top: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .adv-card { border: 1px dashed #39ff14; padding: 15px; margin-bottom: 15px; border-radius: 5px; background: #0d1117; }
        .adv-card strong { display: block; font-size: 1.1rem; margin-bottom: 5px; }
        .adv-card small { display: block; color: #8b949e; margin-bottom: 10px; }
        .wa-btn { display: inline-block; width: 100%; padding: 10px; background: #25d366; color: #fff; text-decoration: none; text-align: center; border-radius: 5px; font-weight: bold; }
        .error { color: #f85149; text-align: center; display: none; margin-top: 10px; }
        footer { font-size: 0.7rem; color: #8b949e; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <h2>DASHBOARD SEVENS</h2>
        <p style="font-size: 0.8rem; margin: 5px 0;">BUSCA TRIBUTÁRIA NACIONAL</p>
    </div>
    <input type="number" id="dddInput" placeholder="DIGITE O DDD (EX: 62)">
    <button class="btn" onclick="consultarBanco()">Consultar Banco de Dados</button>
    <div id="errorMsg" class="error">DDD ainda não mapeado no sistema.</div>
    <div id="resultado"></div>
    <footer>SISTEMA OPERACIONAL SEVENS v2.0</footer>
</div>
<script>
const database = [
    { ddd: "62", nome: "Ficht Advocacia Tributária", esp: "Execuções Fiscais", link: "https://wa.me/5562981710106" },
    { ddd: "62", nome: "Miziara Advogados", esp: "Tributário e Agro", link: "https://wa.me/556232233000" },
    { ddd: "62", nome: "Luan Mazza Advocacia", esp: "Empresarial e Fiscal", link: "https://wa.me/5562985821866" },
    { ddd: "62", nome: "Ronaldo França Advogados", esp: "Contencioso Tributário", link: "https://wa.me/5562984837876" },
    { ddd: "62", nome: "Brum & Associados", esp: "Recuperação de Impostos", link: "https://wa.me/556239454444" },
    { ddd: "11", nome: "Velloza Advogados", esp: "Processos Tributários", link: "https://wa.me/551131450055" },
    { ddd: "11", nome: "Mattos Filho", esp: "Contencioso Alto Valor", link: "https://wa.me/551131477600" },
    { ddd: "11", nome: "Pinheiro Neto Advogados", esp: "Consultoria Fiscal", link: "https://wa.me/551132478400" },
    { ddd: "71", nome: "Gamil Föppel Advogados", esp: "Tributário e Penal", link: "https://wa.me/557130117350" },
    { ddd: "71", nome: "Vila Nova & Advogados", esp: "Consultoria Fiscal BA", link: "https://wa.me/5571991223344" },
    { ddd: "71", nome: "Tourinho Advogados", esp: "Tributário Empresarial", link: "https://wa.me/557134524455" },
    { ddd: "81", nome: "Queiroz Cavalcanti", esp: "Especialista Tributário NE", link: "https://wa.me/558132174444" },
    { ddd: "81", nome: "Da Fonte Advogados", esp: "Planejamento Tributário", link: "https://wa.me/558132557700" },
    { ddd: "81", nome: "Recife Fiscal Associados", esp: "Dívida Ativa e ICMS", link: "https://wa.me/558133004455" }
];

function consultarBanco() {
    const dddBusca = document.getElementById('dddInput').value;
    const listaResultados = document.getElementById('resultado');
    const erroMsg = document.getElementById('errorMsg');
    listaResultados.innerHTML = "";
    erroMsg.style.display = "none";
    const resultados = database.filter(adv => adv.ddd === dddBusca);
    if (resultados.length > 0) {
        resultados.forEach(adv => {
            const item = document.createElement('div');
            item.className = 'adv-card';
            item.innerHTML = `<strong>${adv.nome}</strong><small>${adv.esp}</small><a href="${adv.link}" target="_blank" class="wa-btn">WhatsApp</a>`;
            listaResultados.appendChild(item);
        });
    } else {
        if (dddBusca !== "") { erroMsg.style.display = "block"; }
    }
}
</script>
</body>
</html>
